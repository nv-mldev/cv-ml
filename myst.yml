version: 1
project:
  id: signals-to-transformers
  title: Signals to Transformers
  subtitle: Math and Machine Learning Foundations from Measurement to Multimodal AI
  short_title: Signals → Transformers
  description: >-
    A long-form book that runs from measurement physics and noise, through
    classical signal processing, the math foundations (probability and
    linear algebra), and into modern deep learning — CNNs, attention,
    transformers, vision-language models, and multimodal AI.
  keywords:
    - computer vision
    - machine learning
    - signal processing
    - probability
    - linear algebra
    - deep learning
    - transformers
    - vision-language models
    - multimodal AI
  authors:
    - name: Nithin Vadekkapat
      affiliations:
        - DhvaniAI
  license:
    code: MIT
    content: CC-BY-4.0
  github: https://github.com/nv-mldev/cv-ml
  banner: book/figures/cover.jpg
  thumbnail: book/figures/cover.jpg
  open_access: true

  # Numbering — auto-numbered figures, equations, headings
  numbering:
    enumerator:
      template: '{number}'
    figure:
      enabled: true
    equation:
      enabled: true
    heading_2:
      enabled: true

  # Math macros — usable in any chapter without redefining \newcommand
  math:
    '\E': '\mathbb{E}'
    '\Var': '\mathrm{Var}'
    '\Cov': '\mathrm{Cov}'
    '\R': '\mathbb{R}'
    '\N': '\mathbb{N}'
    '\Z': '\mathbb{Z}'
    '\norm': '\left\| #1 \right\|'
    '\abs': '\left| #1 \right|'
    '\inner': '\left\langle #1 \right\rangle'
    '\given': '\,\vert\,'
    '\iid': '\overset{\text{iid}}{\sim}'
    '\indep': '\perp\!\!\!\perp'
    '\T': '^{\mathsf{T}}'
    '\argmax': '\mathop{\mathrm{arg\,max}}'
    '\argmin': '\mathop{\mathrm{arg\,min}}'

  # Common abbreviations expand to their long form on hover
  abbreviations:
    CV: Computer Vision
    ML: Machine Learning
    DL: Deep Learning
    SNR: Signal-to-Noise Ratio
    PSF: Point Spread Function
    CLT: Central Limit Theorem
    MLE: Maximum Likelihood Estimation
    MAP: Maximum A Posteriori
    PMF: Probability Mass Function
    PDF: Probability Density Function
    CDF: Cumulative Distribution Function
    CNN: Convolutional Neural Network
    ViT: Vision Transformer
    VLM: Vision-Language Model
    OLPF: Optical Low-Pass Filter
    ADC: Analog-to-Digital Converter
    MVTec: MVTec Anomaly Detection (dataset)

  toc:
    - file: book/front_matter/cover.md

    - file: README.md

    - file: book/ch00_introduction/preface.md

    - file: book/ch00_introduction/contents.md

    - title: "Chapter 0 — Introduction"
      children:
        - file: book/ch00_introduction/ch00_introduction.md

    - title: "Part I — Math Foundations"
      children:
        - file: math/README.md

        - title: "Level 1 — Foundations (interleaved prob ↔ stats)"
          children:
            - file: math/probability/README.md
            - file: math/probability/part0_what_is_a_distribution.md
            - file: math/probability/part1_bernoulli.md
            - file: math/statistics/README.md
            - file: math/statistics/ch01_eda.md
            - file: math/statistics/ch02_distributions.md

        - title: "Level 2 — Distributions (probability deep dive)"
          children:
            - file: math/probability/part2_binomial.md
            - file: math/probability/part3_poisson.md
            - file: math/probability/part4_normal.md
            - file: math/probability/part5_clt.md
            - file: math/probability/part6_putting_it_together.md
            - file: math/probability/exercises.md
            - file: math/probability/applied_sensors.md
            - file: math/probability/aside_high_dim_distributions.md
            - file: math/probability/stochastic_processes.md

        - title: "Level 3 — Inference (statistics deep dive)"
          children:
            - file: math/statistics/ch03_pmf.md
            - file: math/statistics/ch04_cdf.md
            - file: math/statistics/ch05_modeling.md
            - file: math/statistics/ch06_pdf.md
            - file: math/statistics/ch07_relationships.md
            - file: math/statistics/ch08_estimation.md
            - file: math/statistics/ch09_hypothesis_testing.md
            - file: math/statistics/ch10_least_squares.md
            - file: math/statistics/ch11_regression.md
            - file: math/statistics/ch12_time_series.md
            - file: math/statistics/ch13_survival.md
            - file: math/statistics/ch14_analytic_methods.md
            - file: math/statistics/exercises.md

        - title: "Linear Algebra (independent track)"
          children:
            - file: math/linear_algebra/README.md
            - file: math/linear_algebra/part1_vectors_and_dot_product.md
            - file: math/linear_algebra/part2_norms_and_similarity.md
            - file: math/linear_algebra/part3_orthogonality_and_projection.md
            - file: math/linear_algebra/part4_linear_transforms.md
            - file: math/linear_algebra/exercises.md
            - file: math/linear_algebra/applied_images.md

    - title: "Part II — Signals and Measurement"
      children:
        - file: book/part2_signals_and_measurement/ch01_digitisation/ch01_digitisation.md
        - file: book/part2_signals_and_measurement/ch02_sensor/ch02_sensor.md
        - file: book/part2_signals_and_measurement/ch03_pixels/ch03_pixels.md
        - file: book/part2_signals_and_measurement/ch04_contrast/ch04_contrast.md
        - file: book/part2_signals_and_measurement/ch05_colour/ch05_colour.md

    - title: "Part III — Why Raw Signals Fail"
      children:
        - file: book/part3_why_raw_signals_fail/ch06_pixel_problems/ch06_pixel_problems.md

    - title: "Part IV — Learning from Signals"
      children:
        - file: book/part5_learning_from_signals/ch09_convolutions/ch09_convolutions.md
        - file: book/part5_learning_from_signals/ch10_backprop/ch10_backprop.md
        - file: book/part5_learning_from_signals/ch11_cnns/ch11_cnns.md
